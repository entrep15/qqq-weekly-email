name: Geometry Sprint Daily Status

on:
  schedule:
    # GitHub cron is UTC and DST-unaware. 6:00 PM Pacific is 01:00 UTC during PDT
    # (summer) and 02:00 UTC during PST (winter). We fire on BOTH; geometry_status.py
    # only proceeds when it is actually the 6 PM hour in Pacific, so exactly one of
    # the two runs sends each day year-round.
    - cron: "0 1 * * *"
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Parse and print the email but do NOT send"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Read sheet and send status email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GEOMETRY_RECIPIENTS: ${{ secrets.GEOMETRY_RECIPIENTS }}
          GEOMETRY_SHEET_URL: ${{ secrets.GEOMETRY_SHEET_URL }}
          EVENT_NAME: ${{ github.event_name }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
        run: python geometry_status.py
