name: Geometry Sprint Daily Status

on:
  schedule:
    # GitHub cron is UTC, DST-unaware, and frequently delayed by hours, especially
    # at the top of the hour. So we fire several times each evening at an off-peak
    # minute; geometry_status.py sends on the first run that is at/after 6 PM
    # Pacific and hasn't already sent today (tracked in state/geometry_last_sent.txt),
    # so exactly one email goes out per day even when a trigger is badly delayed.
    #   6 PM PDT = 01:00 UTC   ·   6 PM PST = 02:00 UTC
    # Covering 01:26–07:26 UTC gives 6 PM–past-11 PM Pacific worth of retries.
    - cron: "26 1 * * *"
    - cron: "26 2 * * *"
    - cron: "26 3 * * *"
    - cron: "26 4 * * *"
    - cron: "26 5 * * *"
    - cron: "26 6 * * *"
    - cron: "26 7 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Parse and print the email but do NOT send"
        type: boolean
        default: false

permissions:
  contents: write  # to commit the once-per-day state file back

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Read sheet and send status email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GEOMETRY_RECIPIENTS: ${{ secrets.GEOMETRY_RECIPIENTS }}
          GEOMETRY_SHEET_URL: ${{ secrets.GEOMETRY_SHEET_URL }}
          EVENT_NAME: ${{ github.event_name }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
        run: python geometry_status.py

      - name: Persist once-per-day send marker
        if: success() && github.event_name == 'schedule'
        run: |
          if [[ -n "$(git status --porcelain state/geometry_last_sent.txt)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/geometry_last_sent.txt
            git commit -m "Geometry status sent [skip ci]"
            git push
            echo "Send marker committed."
          else
            echo "No send marker change to commit."
          fi
