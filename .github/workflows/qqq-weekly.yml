name: QQQ Top 10 Weekly Email

on:
  schedule:
    # GitHub cron is UTC and has no DST awareness. 6:05 AM Pacific is 13:05 UTC
    # during PDT (summer) and 14:05 UTC during PST (winter). We fire on BOTH;
    # qqq_email.py only proceeds when it is actually the 6 AM hour in Pacific,
    # so exactly one of the two runs sends each Friday year-round.
    - cron: "5 13 * * 5"
    - cron: "5 14 * * 5"
  workflow_dispatch:

# Allow the job to commit the refreshed week-over-week state file back.
permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch holdings and send email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
          EVENT_NAME: ${{ github.event_name }}
        run: python qqq_email.py

      - name: Persist week-over-week state
        if: success()
        run: |
          if [[ -n "$(git status --porcelain state/last_week.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/last_week.json
            git commit -m "Update QQQ top-10 state [skip ci]"
            git push
            echo "State committed."
          else
            echo "No state change to commit."
          fi
